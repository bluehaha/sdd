name: Feature Request
description: Submit a feature request for AI-driven development
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you need
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the criteria for considering this feature complete
    validations:
      required: true
  - type: textarea
    id: affected_scope
    attributes:
      label: Affected Scope
      description: Which pages/APIs/modules will this feature affect?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
